function e(tag,props,kids){
  const el=document.createElement(tag);
  if(props)Object.keys(props).forEach(k=>{
    if(k==='style'&&typeof props[k]==='object')Object.assign(el.style,props[k]);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),props[k]);
    else el.setAttribute(k,props[k]);
  });
  if(kids)[].concat(kids).filter(Boolean).forEach(c=>el.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return el;
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function buildApp(){
  const wrap=d({width:'100%',maxWidth:390,height:'100vh',maxHeight:844,margin:'0 auto',position:'relative',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 0 60px rgba(0,0,0,0.3)'},[]);
  if(S.tab==='Discover')wrap.appendChild(buildDiscover());
  else if(S.tab==='Friends')wrap.appendChild(buildFriends());
  else if(S.tab==='Match')wrap.appendChild(buildMatch());
  else if(S.tab==='Chat'){
    if(!S.openChat)wrap.appendChild(buildChatInbox());
    else if(S.openChat.type==='friend')wrap.appendChild(buildFriendConvo(S.openChat.friend,S.openChat.chat));
    else if(S.openChat.type==='anon')wrap.appendChild(buildAnonConvo(S.openChat.match,S.openChat.chat));
  }
  if(S.showShare)wrap.appendChild(buildShare());
  return wrap;
}
