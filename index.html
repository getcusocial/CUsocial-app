// ── DOM helpers ───────────────────────────────────────────────────────────────
function e(tag,props,kids){
  const el=document.createElement(tag);
  if(props)Object.keys(props).forEach(k=>{
    if(k==='style'&&typeof props[k]==='object')Object.assign(el.style,props[k]);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),props[k]);
    else el.setAttribute(k,props[k]);
  });
  if(kids)[].concat(kids).filter(c=>c!=null&&c!==false).forEach(c=>el.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return el;
}
const d=(s,c)=>e('div',{style:s},c);
const sp=(s,t)=>e('span',{style:s},t);
function b(s,t,fn){const btn=e('button',{style:s},typeof t==='string'?[t]:[].concat(t));btn.addEventListener('click',fn);return btn;}
const p2=(s,t)=>e('p',{style:s},t);
const h1=(s,t)=>e('h1',{style:s},t);
const h2=(s,t)=>e('h2',{style:s},t);
const h3=(s,t)=>e('h3',{style:s},t);

// ── Map SVG with city silhouette ──────────────────────────────────────────────
const MAP_CENTER=[40.6097,-111.9391];
let _leafletMaps={};

function makeLeafletMap(id,pins,friendPins){
  if(typeof L==='undefined'){
    const fallback=document.createElement('div');
    fallback.style.cssText='position:absolute;inset:0;background:#eae7df;display:flex;align-items:center;justify-content:center;';
    fallback.innerHTML='<span style="font-family:\'DM Mono\',monospace;font-size:12px;color:#b0aba2;">Map loads on live URL</span>';
    return fallback;
  }
  const container=document.createElement('div');
  container.id=id;
  container.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:1;';
  setTimeout(()=>{
    if(!document.getElementById(id))return;
    const map=L.map(id,{zoomControl:false,attributionControl:false}).setView(MAP_CENTER,15);
    _leafletMaps[id]=map;
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
    const youIcon=L.divIcon({className:'',html:'<div style="width:18px;height:18px;border-radius:50%;background:#4a6fa5;border:3px solid white;box-shadow:0 2px 10px rgba(74,111,165,0.6)"></div>',iconSize:[18,18],iconAnchor:[9,9]});
    L.marker(MAP_CENTER,{icon:youIcon}).addTo(map);
    const offsets=[[-0.004,-0.006],[-0.002,0.008],[0.005,-0.003],[0.003,0.007],[-0.006,0.003]];
    if(pins) pins.forEach((ev,i)=>{
      const o=offsets[i%offsets.length];
      const html=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"><div style="width:36px;height:36px;border-radius:50%;background:${ev.friends>0?'rgba(45,74,62,0.88)':'rgba(26,26,24,0.78)'};border:2.5px solid white;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,0.22)"><div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.9)"></div></div><div style="background:rgba(26,26,24,0.78);color:white;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;font-family:sans-serif">${ev.name}${ev.friends>0?' · '+ev.friends+' friends':''}</div></div>`;
      const marker=L.marker([MAP_CENTER[0]+o[0],MAP_CENTER[1]+o[1]],{icon:L.divIcon({className:'',html,iconSize:[120,58],iconAnchor:[60,18]})}).addTo(map);
      marker.on('click',()=>{S.discoverSel=ev;render();});
    });
    if(friendPins) friendPins.forEach((venue,i)=>{
      const o=offsets[i%offsets.length];
      const html=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"><div style="width:36px;height:36px;border-radius:50%;background:rgba(45,74,62,0.88);border:2.5px solid white;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,0.22);font-size:13px;color:white;font-weight:700;font-family:sans-serif">${venue.friendIds.length}</div><div style="background:rgba(26,26,24,0.78);color:white;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;font-family:sans-serif">${venue.venue}</div></div>`;
      const marker=L.marker([MAP_CENTER[0]+o[0],MAP_CENTER[1]+o[1]],{icon:L.divIcon({className:'',html,iconSize:[100,58],iconAnchor:[50,18]})}).addTo(map);
      marker.on('click',()=>{S.friendsSelV=venue;render();});
    });
    L.control.zoom({position:'bottomright'}).addTo(map);
  },80);
  return container;
}

            else{S.chatPending[chat.id]=true;msgs.push({id:Date.now(),from:'me',type:'reveal_sent'});redraw();setTimeout(()=>{S.chatShowReveal[chat.id]=true;redraw();},1800);}
          })
        ])
      :d({margin:'8px 16px 0',background:'linear-gradient(135deg,#eef4f0,#f2f8f4)',border:`1px solid rgba(76,175,130,0.25)`,borderRadius:16,padding:'12px 16px',display:'flex',alignItems:'center',gap:12,flexShrink:0},[
          d({width:36,height:36,borderRadius:'50%',background:C.green,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'white',flexShrink:0},'✓'),
          d({flex:1},[d({fontSize:11,fontFamily:"'DM Mono',monospace",color:'#2d7a56',marginBottom:3,fontWeight:600},'MUTUALLY REVEALED'),d({fontSize:13,color:C.forest,fontWeight:500},[document.createTextNode('Chatting with '),e('strong',{},match.realName)])])
        ]);
    scr.appendChild(strip);

    // Input
    const input=e('input',{style:{flex:1,background:'none',border:'none',fontSize:15,color:C.ink,padding:'2px 0'},placeholder:stage>=2?'Message '+match.realName+'...':'Say something anonymously...'});
    const sendBtn=(()=>{const sb=document.createElement('button');sb.style.cssText='width:46px;height:46px;border-radius:50%;border:none;background:'+C.forest+';display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 2px 12px rgba(45,74,62,0.35);';sb.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';return sb;})();
    function doSend(){const t=input.value.trim();if(!t)return;input.value='';sendBtn.style.background='#dedad4';sendBtn.style.color='rgba(255,255,255,0.4)';msgs.push({id:Date.now(),from:'me',type:'text',text:t,time:'now'});redraw();setTimeout(()=>{msgs.push({id:Date.now()+1,from:'them',type:'text',text:REPLIES[~~(Math.random()*REPLIES.length)],time:'now'});redraw();},1100);}
    input.addEventListener('input',()=>{sendBtn.style.background=input.value.trim()?C.forest:'#dedad4';sendBtn.style.color=input.value.trim()?'white':'rgba(255,255,255,0.4)';});
    input.addEventListener('keydown',ev=>{if(ev.key==='Enter')doSend();});
    sendBtn.addEventListener('click',doSend);
    scr.appendChild(d({background:'white',borderTop:`1px solid ${C.line}`,padding:'12px 16px 36px',display:'flex',alignItems:'center',gap:10,flexShrink:0},[d({flex:1,background:C.sandL,borderRadius:22,padding:'10px 18px',display:'flex'},[input]),sendBtn]));

    // Anon options sheet (⋯)
    if(S.chatOpts===chat.id){
      const ov=d({position:'absolute',inset:0,background:'rgba(26,26,24,0.45)',backdropFilter:'blur(4px)',WebkitBackdropFilter:'blur(4px)',zIndex:80,display:'flex',flexDirection:'column',justifyContent:'flex-end'},[]);
      const card=d({background:'white',borderRadius:'24px 24px 0 0',padding:'24px 20px 44px',animation:'slideUp 0.28s ease'},[
        d({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,paddingBottom:16,borderBottom:`1px solid ${C.line}`},[
          d({fontSize:17,fontWeight:700,color:C.ink},stage>=2?match.realName:match.handle),
          (()=>{const xb=document.createElement('button');xb.style.cssText='background:rgba(0,0,0,0.06);border:none;width:36px;height:36px;min-width:36px;min-height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;';xb.textContent='×';xb.addEventListener('click',()=>{S.chatOpts=null;redraw();});return xb;})()
        ]),
        ...[
          ['🚫','Block this person',true,()=>{
            S.blockedAnons=[...S.blockedAnons,match.id];
            S.anonChats=S.anonChats.filter(c=>c.matchId!==match.id);
            S.chatOpts=null;S.openChat=null;render();
          }],
          ['⚠️','Report',true,()=>{S.chatOpts=null;redraw();}],
          ['❌','Delete conversation',false,()=>{
            S.anonChats=S.anonChats.filter(c=>c.id!==chat.id);
            S.chatOpts=null;S.openChat=null;render();
          }],
        ].map(([icon,label,danger,fn])=>b({width:'100%',background:'none',border:'none',padding:'15px 4px',display:'flex',alignItems:'center',gap:16,borderBottom:`1px solid ${C.line}`,textAlign:'left'},[sp({fontSize:20,width:32,textAlign:'center',flexShrink:0},icon),sp({fontSize:15,color:danger?C.red:C.ink,fontWeight:500},label)],fn))
      ]);
      ov.appendChild(card);
      ov.addEventListener('click',ev=>{if(ev.target===ov){S.chatOpts=null;redraw();}});
      scr.appendChild(ov);
    }
    // Hint sheet
    if(S.chatShowHint[chat.id]){
      const ov=d({position:'absolute',inset:0,background:'rgba(26,26,24,0.45)',backdropFilter:'blur(4px)',WebkitBackdropFilter:'blur(4px)',zIndex:80,display:'flex',flexDirection:'column',justifyContent:'flex-end'},[]);
      const card=d({background:'white',borderRadius:'24px 24px 0 0',padding:'24px 20px 44px',animation:'slideUp 0.28s ease'},[
        h3({fontSize:20,fontFamily:"'Playfair Display',serif",fontWeight:700,color:C.ink,marginBottom:6},'Drop a hint'),
        p2({fontSize:13,color:'#aaa',marginBottom:18,lineHeight:1.5},'Give them just enough to find you. No names.'),
        d({display:'flex',flexWrap:'wrap',gap:10,marginBottom:16},[...HINTS.map(h=>b({padding:'10px 18px',borderRadius:24,background:C.sandL,border:`1px solid ${C.line}`,color:'#444',fontSize:14,fontWeight:500},h,()=>{S.chatShowHint[chat.id]=false;S.chatStages[chat.id]=1;msgs.push({id:Date.now(),from:'me',type:'hint',text:h});setTimeout(()=>{msgs.push({id:Date.now()+1,from:'them',type:'hint',text:'stage left, dark hoodie'});redraw();},1600);redraw();}))])
      ]);
      const ci=e('input',{style:{flex:1,background:'none',border:'none',fontSize:14,color:C.ink,padding:'8px 0'},placeholder:'Write your own hint...'});
      ci.addEventListener('keydown',ev=>{if(ev.key==='Enter'&&ci.value.trim()){const h=ci.value.trim();S.chatShowHint[chat.id]=false;S.chatStages[chat.id]=1;msgs.push({id:Date.now(),from:'me',type:'hint',text:h});setTimeout(()=>{msgs.push({id:Date.now()+1,from:'them',type:'hint',text:'stage left, dark hoodie'});redraw();},1600);redraw();}});
      card.appendChild(d({display:'flex',gap:10,background:C.sandM,border:`1.5px solid ${C.line}`,borderRadius:14,padding:'4px 4px 4px 16px',alignItems:'center'},[ci,b({padding:'10px 18px',borderRadius:11,background:C.ink,color:'white',border:'none',fontSize:13,fontWeight:600},'Send',()=>{})]));
      ov.appendChild(card);
      ov.addEventListener('click',ev=>{if(ev.target===ov){S.chatShowHint[chat.id]=false;redraw();}});
      scr.appendChild(ov);
    }
    // Reveal modal
    if(S.chatShowReveal[chat.id]){
      scr.appendChild(d({position:'absolute',inset:0,background:'rgba(26,26,24,0.6)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',zIndex:90,display:'flex',alignItems:'center',justifyContent:'center',padding:24},[
        d({background:'white',borderRadius:24,padding:'36px 24px',width:'100%',textAlign:'center',animation:'scaleIn 0.28s ease',boxShadow:'0 24px 60px rgba(0,0,0,0.22)'},[
          d({fontSize:44,marginBottom:16},'👁'),
          h3({fontSize:22,fontFamily:"'Playfair Display',serif",fontWeight:700,color:C.ink,marginBottom:10},`${match.handle} wants to reveal`),
          p2({fontSize:14,color:'#888',lineHeight:1.65,marginBottom:28},"If you both accept, you'll see each other's real names. Can't be undone."),
          d({display:'flex',gap:12},[
            b({flex:1,padding:'14px',background:C.sandL,color:'#888',border:'none',borderRadius:14,fontSize:15,fontWeight:600},'Not yet',()=>{S.chatShowReveal[chat.id]=false;S.chatPending[chat.id]=false;redraw();}),
            b({flex:1,padding:'14px',background:C.ink,color:'white',border:'none',borderRadius:14,fontSize:15,fontWeight:600},'Reveal',()=>{S.chatShowReveal[chat.id]=false;S.chatPending[chat.id]=false;S.chatStages[chat.id]=2;msgs.push({id:Date.now(),from:'system',type:'system',text:'You are both revealed. Say hi.'});setTimeout(()=>{if(!S.friends.some(f=>f.name===match.realName)){S.chatShowAdd[chat.id]=true;}redraw();},800);redraw();})
          ])
        ])
      ]));
    }
    // Add friend modal
    if(S.chatShowAdd[chat.id]&&!S.friends.some(f=>f.name===match.realName)){
      scr.appendChild(d({position:'absolute',inset:0,background:'rgba(26,26,24,0.6)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:24},[
        d({background:'white',borderRadius:24,padding:'36px 24px',width:'100%',textAlign:'center',animation:'scaleIn 0.28s ease',boxShadow:'0 24px 60px rgba(0,0,0,0.22)'},[
          d({width:68,height:68,borderRadius:20,background:match.color,margin:'0 auto 18px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,color:'white',fontWeight:700},match.realInitials),
          h3({fontSize:22,fontFamily:"'Playfair Display',serif",fontWeight:700,color:C.ink,marginBottom:8},`Add ${match.realName}?`),
          p2({fontSize:14,color:'#888',lineHeight:1.65,marginBottom:26},'You are now revealed. Stay connected on C-U?'),
          d({display:'flex',gap:12},[
            b({flex:1,padding:'14px',background:C.sandL,color:'#888',border:'none',borderRadius:14,fontSize:15,fontWeight:600},'Maybe later',()=>{S.chatShowAdd[chat.id]=false;redraw();}),
            b({flex:1,padding:'14px',background:C.forest,color:'white',border:'none',borderRadius:14,fontSize:15,fontWeight:600},'Add friend',()=>{const nf={id:Date.now(),name:match.realName,initials:match.realInitials,color:match.color,status:'out'};S.friends=[...S.friends,nf];S.friendChats=[...S.friendChats,{id:`fc${Date.now()}`,friendId:nf.id,lastMsg:"You're now friends on C-U.",time:'now',unread:false,messages:[{id:1,from:'system',type:'system',text:`You and ${match.realName} are now friends.`,time:'now'}]}];S.chatShowAdd[chat.id]=false;redraw();})
          ])
        ])
      ]));
    }
  }
  redraw();
  return scr;
}

// ── SHARE ─────────────────────────────────────────────────────────────────────
function buildShare(){
  const ov=d({position:'absolute',inset:0,background:'rgba(26,26,24,0.55)',backdropFilter:'blur(6px)',WebkitBackdropFilter:'blur(6px)',zIndex:90,display:'flex',alignItems:'flex-end'},[]);
  const card=d({background:'white',borderRadius:'24px 24px 0 0',padding:'28px 24px 48px',width:'100%',animation:'slideUp 0.3s ease'},[
    h3({fontSize:20,fontFamily:"'Playfair Display',serif",fontWeight:700,color:C.ink,marginBottom:6,textAlign:'center'},'Add a friend'),
    p2({fontSize:13,color:'#aaa',textAlign:'center',marginBottom:22,lineHeight:1.5},'Share your link. Anyone who taps it can send you a friend request.'),
    d({background:C.sandM,border:`1.5px solid ${C.line}`,borderRadius:14,padding:'14px 16px',display:'flex',alignItems:'center',gap:12,marginBottom:16},[
      d({flex:1,fontSize:13,fontFamily:"'DM Mono',monospace",color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},'cu://add/marble-dusk-j4x9'),
      (()=>{const cb=b({background:C.ink,color:'white',border:'none',padding:'8px 16px',borderRadius:10,fontSize:13,fontWeight:600,flexShrink:0},'Copy',()=>{cb.textContent='Copied ✓';cb.style.background=C.forest;setTimeout(()=>{cb.textContent='Copy';cb.style.background=C.ink;},2000);});return cb;})()
    ]),
    b({width:'100%',padding:'14px',background:C.sandL,color:'#888',border:'none',borderRadius:14,fontSize:14,fontWeight:600},'Done',()=>{S.showShare=false;render();})
  ]);
  ov.appendChild(card);
  ov.addEventListener('click',ev=>{if(ev.target===ov){S.showShare=false;render();}});
  return ov;
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function buildApp(){
  const wrap=d({width:'100%',maxWidth:430,height:'100dvh',margin:'0 auto',position:'relative',overflow:'hidden',display:'flex',flexDirection:'column'},[]);
  if(S.tab==='Discover')wrap.appendChild(buildDiscover());
  else if(S.tab==='Friends')wrap.appendChild(buildFriends());
  else if(S.tab==='Match')wrap.appendChild(buildMatch());
  else if(S.tab==='Chat'){
    if(!S.openChat)wrap.appendChild(buildChatInbox());
    else if(S.openChat.type==='friend')wrap.appendChild(buildFriendConvo(S.openChat.friend,S.openChat.chat));
    else if(S.openChat.type==='anon')wrap.appendChild(buildAnonConvo(S.openChat.match,S.openChat.chat));
  }
  if(S.showShare)wrap.appendChild(buildShare());
  if(S.showProfile)wrap.appendChild(buildProfile());
  return wrap;
}
render();
</script>
